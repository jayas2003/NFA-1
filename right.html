<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Materi Fullstack</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 10px;
        background: linear-gradient(to bottom, #ffffff, #f5f7ff);
    }
    fieldset {
        border: 2px solid #ff9800;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    legend {
        font-weight: bold;
        color: #ff9800;
    }
    ul {
        list-style: none;
        padding: 0;
    }
    ul li {
        margin: 8px 0;
    }
    a {
        text-decoration: none;
        color: #2c3e50;
        font-weight: bold;
        transition: 0.3s;
    }
    a:hover {
        color: #ff9800;
    }
</style>
</head>
<body>
    <fieldset>
        <legend>💻 Materi Fullstack</legend>
        <ul>
            <li><a href="https://developer.mozilla.org/en-US/docs/Web/HTML" target="_blank">HTML Basics</a></li>
            <li><a href="https://developer.mozilla.org/en-US/docs/Web/CSS" target="_blank">CSS Styling</a></li>
            <li><a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank">JavaScript</a></li>
            <li><a href="https://nodejs.org/en/docs" target="_blank">Node.js</a></li>
            <li><a href="https://react.dev/" target="_blank">React.js</a></li>
        </ul>
    </fieldset>
</body>
</html>
