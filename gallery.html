<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galeri</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="img/jayas1.jpeg">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(to bottom, #fff7e6, #ffffff);
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        font-weight: bold;
    }
    marquee {
        font-size: 16px;
        color: #4e73df;
        margin-bottom: 20px;
        font-weight: bold;
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        max-width: 700px;
        margin: auto;
    }
    .gallery img {
        width: 100%;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        transition: transform 0.3s;
    }
    .gallery img:hover {
        transform: scale(1.05);
    }
</style>
</head>
<body>
    <h2>🖼 Galeri Foto</h2>
    <marquee behavior="scroll" direction="left">Selamat datang di Galeri Jayas Permana!</marquee>

    <div class="gallery">
        <img src="img/jayas1.jpeg" alt="Foto 1">
        <img src="img/jayas2.jpg" alt="Foto 2">
        <img src="img/jayas3.jpg" alt="Foto 3">
        <img src="img/jayas4.jpg" alt="Foto 4">
    </div>
</body>
</html>
