<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Riwayat Pendidikan</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(to bottom, #f0f4ff, #ffffff);
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        font-weight: bold;
    }
    table {
        width: 80%;
        margin: auto;
        border-collapse: collapse;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: center;
    }
    th {
        background: #4e73df;
        color: white;
        font-weight: bold;
    }
    tr:nth-child(even) {
        background: #f9f9f9;
    }
</style>
</head>
<body>
    <h2>📖 Riwayat Pendidikan</h2>
    <table>
        <tr>
            <th>Tahun</th>
            <th>Sekolah/Universitas</th>
            <th>Keterangan</th>
        </tr>
        <tr>
            <td>2010 - 2016</td>
            <td>SD Negeri 01</td>
            <td>Lulus</td>
        </tr>
        <tr>
            <td>2016 - 2019</td>
            <td>SMP Negeri 02</td>
            <td>Lulus</td>
        </tr>
        <tr>
            <td>2019 - 2022</td>
            <td>SMA Negeri 03</td>
            <td>Lulus</td>
        </tr>
        <tr>
            <td>2022 - Sekarang</td>
            <td>STT Nurul Fikri</td>
            <td>Mahasiswa Informatika</td>
        </tr>
    </table>
</body>
</html>
